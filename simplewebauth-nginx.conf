# Nginx snippet — block direct web access to simplewebauth sensitive files.
#
# INSTALL: copy or symlink to /etc/nginx/snippets/simplewebauth.conf
#
#   sudo cp simplewebauth-nginx.conf /etc/nginx/snippets/simplewebauth.conf
#
# USAGE: add one include line inside each server {} block that serves a
# docroot where simplewebauth may be deployed:
#
#   server {
#       ...
#       include snippets/simplewebauth.conf;
#   }
#
# WHY NOT conf.d? Files in conf.d/ are loaded at the http {} level where
# location blocks are not valid. A snippet included per-server block is the
# correct Nginx pattern for sharing location rules across virtual hosts.
#
# The ~ modifier makes matching case-sensitive (appropriate for Linux).
# auth_users.php lives outside the docroot in /etc/simplewebauth/ so it is
# not web-accessible at all. Only manage_users.php needs to be blocked here.

location ~ /simplewebauth/manage_users\.php$ {
    deny all;
    return 403;
}
